# Optional compose merge — bind-mounts a Firebase **service account JSON** from the host into the worker.
# Used automatically by scripts/start-push-worker.sh when FIREBASE_SA_HOST_PATH points to an existing file.
#
# Manual:
#   export FIREBASE_SA_HOST_PATH=/absolute/path/to/your-service-account.json
#   docker compose -f docker-compose.yml -f docker-compose.credentials.yml up -d --build
#
# Do not commit real JSON; keep the file gitignored (e.g. many_faces_push/firebase-sa.json matches *-sa.json).
services:
  push-worker:
    volumes:
      - type: bind
        source: ${FIREBASE_SA_HOST_PATH}
        target: /run/secrets/firebase-sa.json
        read_only: true
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-sa.json
